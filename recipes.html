<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="40 gut-friendly Low-FODMAP recipes for SIBO — breakfasts, mains, soups, salads, snacks, sweets and kitchen basics, filterable by type." />
  <title>Recipes · SIBO Plate</title>

  <link rel="preload" href="fonts/nunito-sans.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍃</text></svg>" />
</head>
<body data-page="recipes">
  <main>
    <section id="recipes" class="section">
      <div class="section-head">
        <span class="kicker">Cook with confidence</span>
        <h2>Recipes that just work</h2>
        <p class="section-sub">40 gut-friendly recipes — every ingredient sits on the green or yellow list. Filter by type, then tap a card for the full method.</p>
      </div>

      <div id="recipeFilters" class="cat-filters" role="group" aria-label="Filter recipes by type"></div>
      <p id="recipeCount" class="result-count" aria-live="polite"></p>
      <div id="recipeGrid" class="recipe-grid"></div>
    </section>
  </main>

  <!-- ============================ RECIPE MODAL ============================ -->
  <div id="recipeModal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" data-close aria-label="Close recipe">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
